ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.ecotrace.backend.ApplicationKt.module ]
    }
}

jwt {
    secret = "ecotrace-secret-key-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "ecotrace"
    audience = "ecotrace-users"
    realm = "EcoTrace API"
    expiresInMs = 86400000  # 24 hours
}

database {
    url = "jdbc:postgresql://localhost:5432/ecotrace"
    url = ${?DATABASE_URL}
    user = "ecotrace"
    user = ${?DATABASE_USER}
    password = "ecotrace"
    password = ${?DATABASE_PASSWORD}
    driver = "org.postgresql.Driver"
    maxPoolSize = 10
}
